<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Complete - Aegis Cloud Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .animated-check-container { width: 100px; height: 100px; margin: 1rem auto; }
        .animated-check-svg .circle { stroke-dasharray: 283; stroke-dashoffset: 283; animation: draw-circle 1s ease-out forwards; }
        .animated-check-svg .tick { stroke-dasharray: 80; stroke-dashoffset: 80; animation: draw-tick 0.8s ease-out 0.5s forwards; }
        @keyframes draw-circle { to { stroke-dashoffset: 0; } }
        @keyframes draw-tick { to { stroke-dashoffset: 0; } }
        
        .instructions-container { margin-top: 2rem; }
        .terminal { background-color: #1e1e1e; color: #f1f1f1; font-family: 'Courier New', Courier, monospace; border-radius: var(--border-radius); padding: 1rem; text-align: left; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .terminal-header, .browser-header { padding-bottom: 0.5rem; margin-bottom: 1rem; border-bottom: 1px solid #444; color: #888; }
        .instruction-step { font-weight: bold; color: var(--medium-grey); margin-bottom: 0.5rem; }
        .terminal-line::before { content: '$ '; color: var(--primary-color); }
        
        .browser-instructions { margin-top: 1.5rem; background-color: var(--light-grey); color: var(--dark-grey); border-radius: var(--border-radius); padding: 1rem; text-align: left; }
        body.dark-mode .browser-instructions { background-color: #2C3E50; color: var(--dark-grey); }
        .browser-instructions #browser-content { font-family: 'Poppins', sans-serif; font-size: 1.1em; }
        
        .Typewriter__cursor { color: white; animation: blink 1s step-end infinite; }
        .browser-instructions .Typewriter__cursor { color: var(--dark-grey); }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="auth-body-override">
    <div class="auth-container" style="text-align: center; max-width: 600px;">
        <div class="animated-check-container">
            <svg class="animated-check-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle class="circle" cx="50" cy="50" r="45" fill="none" stroke="#4CAF50" stroke-width="5"/>
                <polyline class="tick" points="28,52 45,69 72,42" fill="none" stroke="#4CAF50" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h2>Setup Complete!</h2>
        <p>Your configuration has been saved. Please follow the steps below to restart the application.</p>
        
        {% if is_frozen %}
            <div class="instructions-container">
                <p>The application will now restart automatically.</p>
                <a href="/restart_app" class="button" style="margin-top: 1rem;">Relaunch Now</a>
            </div>
        {% else %}
            <div class="instructions-container">
                <div class="terminal">
                    <div class="terminal-header">bash -- Aegis Control</div>
                    <div id="terminal-content"></div>
                </div>
                <div class="browser-instructions" id="browser-instructions-box" style="visibility: hidden;">
                    <div class="browser-header"><i class="fas fa-window-maximize"></i> Browser</div>
                    <div id="browser-content"></div>
                </div>
            </div>
        {% endif %}
    </div>

<script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
<script>
    {% if not is_frozen %}
        const terminalElement = document.getElementById('terminal-content');
        const browserBox = document.getElementById('browser-instructions-box');
        const browserElement = document.getElementById('browser-content');

        const terminalWriter = new Typewriter(terminalElement, { loop: false, delay: 60, cursor: '█' });
        const browserWriter = new Typewriter(browserElement, { loop: false, delay: 60, cursor: '|' });

        terminalWriter
            .pauseFor(500)
            .typeString('<div class="instruction-step">Step 1: Stop the current server</div>')
            .typeString('<span class="terminal-line">Press <strong>Ctrl+C</strong> in your terminal.</span>')
            .pauseFor(1500)
            .typeString('<br><br><div class="instruction-step">Step 2: Restart the server</div>')
            .typeString('<span class="terminal-line">python app.py</span>')
            .pauseFor(1000)
            .callFunction(() => {
                // Show the browser box and start the next animation
                browserBox.style.visibility = 'visible';
                browserWriter
                    .pauseFor(500)
                    .typeString('<div class="instruction-step">Step 3: Relaunch Application</div>')
                    .typeString('You can now close this tab and visit:<br><strong><a href="http://127.0.0.1:5000/" target="_blank">http://127.0.0.1:5000/</a></strong>')
                    .start();
            })
            .start();
    {% endif %}
</script>
</body>
</html>
